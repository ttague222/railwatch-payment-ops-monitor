name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: railwatch

      - name: Build
        run: npm run build
        working-directory: railwatch

      - name: Unit tests
        run: npm test
        working-directory: railwatch

  e2e:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: railwatch

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: railwatch

      - name: Start dev server and run E2E tests
        run: |
          npm run dev &
          npx wait-on http://localhost:5173 --timeout 30000
          npm run test:e2e
        working-directory: railwatch
